services:
  mongo:
    image: mongo
    container_name: mst-certificate-mongo
    restart: unless-stopped
    ports:
      - ${MONGO_PORT}:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    command: --wiredTigerCacheSizeGB 0.25
    volumes:
      - ${MONGO_DATA_VOLUME}/db:/data/db
      - ${MONGO_DATA_VOLUME}/configdb:/data/configdb
  mst-certificate-:
    image: mst-certificate-${APP_ENV}-${NODE_TYPE}
    build:
      context: .
      target: mst-certificate
      args:
        - PORT:${PORT}
    container_name: mst-certificate-${APP_ENV}-${NODE_TYPE}
    restart: unless-stopped
    ports:
      - ${PORT}:${PORT}
    # Uncomment this to disable run application on standalone mode
    # depends_on:
    #   - postgres
    #   - redis
    volumes:
      - .env:/mst-certificate/.env:ro
      - ${STORAGE_DATA_VOLUME}:/mst-certificate/${STORAGE_DIR}
      - ${LOG_VOLUME}:/mst-certificate/${LOG_DIR}
networks:
  default:
    name: mst-certificate
